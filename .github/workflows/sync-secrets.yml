name: Sync Secrets to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install wrangler
        run: npm install wrangler@4

      - name: Sync CEREBRAS_API_KEY
        if: ${{ secrets.CEREBRAS_API_KEY != '' }}
        run: echo "$CEREBRAS_API_KEY" | npx wrangler pages secret put CEREBRAS_API_KEY --project-name tw-bot
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync GEMINI_API_KEY
        if: ${{ secrets.GEMINI_API_KEY != '' }}
        run: echo "$GEMINI_API_KEY" | npx wrangler pages secret put GEMINI_API_KEY --project-name tw-bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync GROQ_API_KEY
        if: ${{ secrets.GROQ_API_KEY != '' }}
        run: echo "$GROQ_API_KEY" | npx wrangler pages secret put GROQ_API_KEY --project-name tw-bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync OPENROUTER_API_KEY
        if: ${{ secrets.OPENROUTER_API_KEY != '' }}
        run: echo "$OPENROUTER_API_KEY" | npx wrangler pages secret put OPENROUTER_API_KEY --project-name tw-bot
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync NVIDIA_API_KEY
        if: ${{ secrets.NVIDIA_API_KEY != '' }}
        run: echo "$NVIDIA_API_KEY" | npx wrangler pages secret put NVIDIA_API_KEY --project-name tw-bot
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync TAVILY_API_KEY
        if: ${{ secrets.TAVILY_API_KEY != '' }}
        run: echo "$TAVILY_API_KEY" | npx wrangler pages secret put TAVILY_API_KEY --project-name tw-bot
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync EXA_API_KEY
        if: ${{ secrets.EXA_API_KEY != '' }}
        run: echo "$EXA_API_KEY" | npx wrangler pages secret put EXA_API_KEY --project-name tw-bot
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync TURNSTILE_SECRET_KEY
        if: ${{ secrets.TURNSTILE_SECRET_KEY != '' }}
        run: echo "$TURNSTILE_SECRET_KEY" | npx wrangler pages secret put TURNSTILE_SECRET_KEY --project-name tw-bot
        env:
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync DEV_IPS
        if: ${{ secrets.DEV_IPS != '' }}
        run: echo "$DEV_IPS" | npx wrangler pages secret put DEV_IPS --project-name tw-bot
        env:
          DEV_IPS: ${{ secrets.DEV_IPS }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}