name: Sync Secrets to Cloudflare Pages

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync secrets to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: |
            if [ -n "$CEREBRAS_API_KEY" ]; then
              echo "$CEREBRAS_API_KEY" | wrangler pages secret put CEREBRAS_API_KEY --project-name tw-bot
            fi
            if [ -n "$GEMINI_API_KEY" ]; then
              echo "$GEMINI_API_KEY" | wrangler pages secret put GEMINI_API_KEY --project-name tw-bot
            fi
            if [ -n "$OPENROUTER_API_KEY" ]; then
              echo "$OPENROUTER_API_KEY" | wrangler pages secret put OPENROUTER_API_KEY --project-name tw-bot
            fi
            if [ -n "$NVIDIA_API_KEY" ]; then
              echo "$NVIDIA_API_KEY" | wrangler pages secret put NVIDIA_API_KEY --project-name tw-bot
            fi
            if [ -n "$TURNSTILE_SECRET_KEY" ]; then
              echo "$TURNSTILE_SECRET_KEY" | wrangler pages secret put TURNSTILE_SECRET_KEY --project-name tw-bot
            fi
            if [ -n "$SUPABASE_URL" ]; then
              echo "$SUPABASE_URL" | wrangler pages secret put SUPABASE_URL --project-name tw-bot
            fi
            if [ -n "$SUPABASE_SERVICE_ROLE_KEY" ]; then
              echo "$SUPABASE_SERVICE_ROLE_KEY" | wrangler pages secret put SUPABASE_SERVICE_ROLE_KEY --project-name tw-bot
            fi
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}