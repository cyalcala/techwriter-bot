name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, codex/privacy-first-disclosure]
  workflow_dispatch:

jobs:
  graphify:
    if: github.ref_name == 'main' || github.ref_name == 'codex/privacy-first-disclosure'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build knowledge graph
        run: bash scripts/graphify-ci.sh
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Read app version
        id: app-version
        run: node -e "process.stdout.write('value=' + require('./package.json').version + '\n')" >> "$GITHUB_OUTPUT"

      - name: Build
        run: npm run build

      - name: Post-process build (copy worker/chunks/middleware)
        run: |
          WORKER_ENTRY=$(ls dist/server/worker-entry-*.mjs 2>/dev/null | head -1)
          if [ -n "$WORKER_ENTRY" ]; then
            cp "$WORKER_ENTRY" dist/client/_worker.js
            echo "Copied $WORKER_ENTRY -> dist/client/_worker.js"
          elif [ -f "dist/server/entry.mjs" ]; then
            cp dist/server/entry.mjs dist/client/_worker.js
            echo "Copied dist/server/entry.mjs -> dist/client/_worker.js"
          fi

          if [ -d "dist/server/chunks" ]; then
            mkdir -p dist/client/chunks
            cp -r dist/server/chunks/* dist/client/chunks/
            echo "Copied server chunks"
          fi

          if [ -f "dist/server/virtual_astro_middleware.mjs" ]; then
            cp dist/server/virtual_astro_middleware.mjs dist/client/
            echo "Copied middleware"
          fi

          rm -f dist/client/.assetsignore
          rm -f dist/wrangler.json dist/server/wrangler.json 2>/dev/null || true
          rm -f .wrangler/deploy/config.json 2>/dev/null || true

      - name: Configure runtime secrets before deployment
        run: |
          node -e "
          const vars = {
            GROQ_API_KEY: process.env.GROQ_API_KEY,
            CEREBRAS_API_KEY: process.env.CEREBRAS_API_KEY,
            GEMINI_API_KEY: process.env.GEMINI_API_KEY,
            NVIDIA_API_KEY: process.env.NVIDIA_API_KEY,
            OPENROUTER_API_KEY: process.env.OPENROUTER_API_KEY,
            TAVILY_API_KEY: process.env.TAVILY_API_KEY,
            EXA_API_KEY: process.env.EXA_API_KEY,
            TURNSTILE_SECRET_KEY: process.env.TURNSTILE_SECRET_KEY,
            DEV_IPS: process.env.DEV_IPS,
            SYSTEM_PROMPT: process.env.SYSTEM_PROMPT,
            PERSONA_NAME: process.env.PERSONA_NAME,
          };
          const body = JSON.stringify({
            deployment_configs: { [process.env.DEPLOYMENT_ENV]: { env_vars: Object.fromEntries(
              Object.entries(vars).filter(([,v]) => v).map(([k,v]) => [k, { type: 'secret_text', value: v }])
            )}}
          });
          const https = require('https');
          const req = https.request({
            hostname: 'api.cloudflare.com',
            path: '/client/v4/accounts/' + process.env.CLOUDFLARE_ACCOUNT_ID + '/pages/projects/tw-bot',
            method: 'PATCH',
            headers: { 'Authorization': 'Bearer ' + process.env.CLOUDFLARE_API_TOKEN, 'Content-Type': 'application/json' }
          }, (res) => {
            let data = '';
            res.on('data', chunk => data += chunk);
            res.on('end', () => {
              let result = {};
              try { result = JSON.parse(data); } catch {}
              if (res.statusCode < 200 || res.statusCode >= 300 || result.success !== true) {
                console.error('Failed to configure Cloudflare runtime secrets before deploy.');
                process.exitCode = 1;
                return;
              }
              console.log('Configured Cloudflare runtime secrets before deploy.');
            });
          });
          req.on('error', () => {
            console.error('Failed to configure Cloudflare runtime secrets before deploy.');
            process.exitCode = 1;
          });
          req.write(body); req.end();
          "
        env:
          DEPLOYMENT_ENV: ${{ github.ref_name == 'main' && 'production' || 'preview' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          DEV_IPS: ${{ secrets.DEV_IPS }}
          SYSTEM_PROMPT: ${{ secrets.SYSTEM_PROMPT }}
          PERSONA_NAME: ${{ vars.PERSONA_NAME || secrets.PERSONA_NAME }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Publish application version marker
        run: npx wrangler kv key put --binding=SESSION "tw-bot:app:version" "$APP_VERSION" --remote
        env:
          APP_VERSION: ${{ steps.app-version.outputs.value }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist/client --project-name tw-bot --branch ${{ github.ref_name }} --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
